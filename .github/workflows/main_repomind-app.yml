name: Build and deploy Node.js app to Azure Web App - repomind-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install backend dependencies
        run: |
          cd backend
          npm install --omit=dev

      - name: Install and build frontend
        run: |
          cd frontend
          npm install
          npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r backend deploy/backend
          cp -r frontend/.next deploy/frontend/.next
          cp -r frontend/public deploy/frontend/public 2>/dev/null || true
          cp package.json deploy/
          zip -r deploy.zip deploy/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DFC8EE7E666745AAB11703D8D5B2D5CA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_583699A6FACB4FFA8F9B85581F597190 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_997F5623E2B04295B7470BE6B9D1F5BE }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'repomind-app'
          slot-name: 'Production'
          package: deploy.zip